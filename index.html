<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Price Drop Alerts</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f7f7f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; text-align: center; }
    input[type="email"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
    button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #0056b3; }
    .note { font-size: 0.8em; color: #666; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📚 Book Price Drop Alerts</h1>
    <p>Get notified when books from our catalog drop in price. It's free.</p>
    <form action="https://formspree.io/f/mwvdklly" method="POST">
      <input type="email" name="email" placeholder="Your email address" required>
      <button type="submit">Subscribe</button>
    </form>
    <p class="note">No spam. Unsubscribe anytime.</p>
  </div>
</body>
</html>
